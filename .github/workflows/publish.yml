name: Publish

# Triggers on tag push matching v*.*.* (e.g. v0.1.0, v1.2.3-rc.1).
# Publishes every package under packages/* whose package.json version
# matches the tag. Versions must be kept in lockstep — use `pnpm bump`.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance (sigstore-signed publish attestations).
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify all package versions match the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"
          FAIL=0
          for pkg in packages/*/package.json; do
            PKG_NAME=$(node -p "require('./$pkg').name")
            PKG_VERSION=$(node -p "require('./$pkg').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$PKG_NAME is at $PKG_VERSION but tag is $TAG_VERSION"
              FAIL=1
            else
              echo "OK $PKG_NAME@$PKG_VERSION"
            fi
          done
          exit $FAIL

      - name: Build
        run: pnpm -r build

      - name: Publish
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
