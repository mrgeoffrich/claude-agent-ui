name: Publish

# Fires when a GitHub Release is published. Publishes every package whose
# version in package.json matches the release tag. Tokenless — npm OIDC
# Trusted Publishing provides auth and provenance automatically.
#
# One-time per package: register a Trusted Publisher on npmjs.com
# (Settings → Trusted publishing) pointing at this repo, this workflow file,
# and the "npm" environment.
#
# pnpm is used only for the workspace install/build step because
# pnpm publish does not yet support OIDC (pnpm/pnpm#9812). Publishing itself
# goes through `npm publish`.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify all package versions match the release tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Release tag version: $TAG_VERSION"
          FAIL=0
          for pkg in packages/*/package.json; do
            PKG_NAME=$(node -p "require('./$pkg').name")
            PKG_VERSION=$(node -p "require('./$pkg').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$PKG_NAME is at $PKG_VERSION but release is $TAG_VERSION"
              FAIL=1
            else
              echo "OK $PKG_NAME@$PKG_VERSION"
            fi
          done
          exit $FAIL

      - run: pnpm -r build

      - run: pnpm -r typecheck

      - name: Debug publish environment
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "NODE_AUTH_TOKEN set: ${NODE_AUTH_TOKEN:+yes}"
          echo "NPM_CONFIG_USERCONFIG: $NPM_CONFIG_USERCONFIG"
          cat "$NPM_CONFIG_USERCONFIG" || echo "(no userconfig file)"

      - name: Publish
        run: |
          set -euo pipefail
          # Write a clean .npmrc with only the registry URL — no _authToken —
          # so npm uses OIDC trusted publishing for auth instead of the GitHub
          # token that actions/setup-node exports as NODE_AUTH_TOKEN.
          CLEAN_NPMRC=$(mktemp)
          echo "registry=https://registry.npmjs.org/" > "$CLEAN_NPMRC"
          for pkg in packages/*/; do
            echo "::group::Publishing $pkg"
            (cd "$pkg" && NPM_CONFIG_USERCONFIG="$CLEAN_NPMRC" npm publish --provenance)
            echo "::endgroup::"
          done
