name: Publish

# Fires when a GitHub Release is published. Publishes every package whose
# version in package.json matches the release tag. Tokenless — npm OIDC
# Trusted Publishing provides auth and provenance automatically.
#
# One-time per package: register a Trusted Publisher on npmjs.com
# (Settings → Trusted publishing) pointing at this repo, this workflow file,
# and the "npm" environment.
#
# pnpm is used only for the workspace install/build step because
# pnpm publish does not yet support OIDC (pnpm/pnpm#9812). Publishing itself
# goes through `npm publish`.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify all package versions match the release tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Release tag version: $TAG_VERSION"
          FAIL=0
          for pkg in packages/*/package.json; do
            PKG_NAME=$(node -p "require('./$pkg').name")
            PKG_VERSION=$(node -p "require('./$pkg').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$PKG_NAME is at $PKG_VERSION but release is $TAG_VERSION"
              FAIL=1
            else
              echo "OK $PKG_NAME@$PKG_VERSION"
            fi
          done
          exit $FAIL

      - run: pnpm -r build

      - run: pnpm -r typecheck

      - name: Publish
        run: |
          set -euo pipefail
          # actions/setup-node exports NODE_AUTH_TOKEN=GITHUB_TOKEN, which npm
          # substitutes into _authToken in .npmrc, causing auth to fail with
          # the GitHub token instead of using OIDC. Unset it so the .npmrc
          # _authToken resolves to empty and npm falls through to OIDC.
          unset NODE_AUTH_TOKEN
          for pkg in packages/*/; do
            echo "::group::Publishing $pkg"
            (cd "$pkg" && npm publish --provenance)
            echo "::endgroup::"
          done
